services:
  frontend:
    image: nginx:1.27-alpine
    container_name: valorant_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: node:20-alpine
    container_name: valorant_api
    working_dir: /app
    command: >-
      sh -c "echo 'NestJS API container scaffold is running. Replace command with app start when code is added.'
      && tail -f /dev/null"
    environment:
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_RSO_CLIENT_ID: ${RIOT_RSO_CLIENT_ID:-}
      RIOT_RSO_CLIENT_SECRET: ${RIOT_RSO_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      # Set DATABASE_URL in .env (see .env.example). No weak in-file password default is used here.
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-false}
    volumes:
      - ./:/app:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  discord-bot:
    image: node:20-alpine
    container_name: valorant_discord_bot
    working_dir: /app
    command: >-
      sh -c "echo 'Sapphire/discord.js bot container scaffold is running. Replace command with bot start when code is added.'
      && tail -f /dev/null"
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./:/app:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: valorant_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: valorant_postgres
    environment:
      POSTGRES_DB: valorant_tournament
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Local-development default only. Override in .env for any shared/non-local deployment.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
